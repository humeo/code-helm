name: Publish npm Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Show npm CLI version used for publish
        run: bunx npm@latest --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Run typecheck
        run: bun run typecheck

      - name: Verify tag matches package.json version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($VERSION) does not match tag ($TAG_VERSION)" >&2
            exit 1
          fi

      - name: Publish to npm with latest npm CLI
        run: bunx npm@latest publish

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          RELEASE_NOTES_JSON="$(mktemp)"
          RELEASE_NOTES_BODY="$(mktemp)"

          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$TAG" > "$RELEASE_NOTES_JSON"

          TITLE="$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(data.name);" "$RELEASE_NOTES_JSON")"
          node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(data.body);" "$RELEASE_NOTES_JSON" > "$RELEASE_NOTES_BODY"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file "$RELEASE_NOTES_BODY"
          else
            gh release create "$TAG" --verify-tag --title "$TITLE" --notes-file "$RELEASE_NOTES_BODY"
          fi
