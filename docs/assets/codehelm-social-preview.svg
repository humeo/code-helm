<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">CodeHelm social preview</title>
  <desc id="desc">CodeHelm: Control local Codex sessions from Discord. Approve, resume, interrupt from your phone.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="64" y="64" width="1152" height="512" rx="36" fill="#020617" opacity="0.26"/>

  <g transform="translate(84 92)" filter="url(#softShadow)">
    <rect x="0" y="0" width="506" height="456" rx="26" fill="#0b1120" stroke="#334155" stroke-width="2"/>
    <rect x="0" y="0" width="506" height="62" rx="26" fill="#111827"/>
    <circle cx="36" cy="31" r="7" fill="#ef4444"/>
    <circle cx="62" cy="31" r="7" fill="#f59e0b"/>
    <circle cx="88" cy="31" r="7" fill="#22c55e"/>
    <text x="124" y="38" fill="#cbd5e1" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="19" font-weight="700">local Codex</text>

    <rect x="34" y="98" width="438" height="62" rx="16" fill="#111827" stroke="#1f2937"/>
    <text x="58" y="135" fill="#e5e7eb" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="22" font-weight="700">codex --remote ws://127.0.0.1</text>

    <rect x="34" y="190" width="438" height="52" rx="14" fill="#0f172a" stroke="#1f2937"/>
    <text x="58" y="223" fill="#94a3b8" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="20">workdir: ~/code/project</text>

    <rect x="34" y="270" width="138" height="54" rx="14" fill="#14532d"/>
    <text x="62" y="304" fill="#dcfce7" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="21" font-weight="800">approve</text>
    <rect x="192" y="270" width="128" height="54" rx="14" fill="#1e3a8a"/>
    <text x="226" y="304" fill="#dbeafe" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="21" font-weight="800">resume</text>
    <rect x="340" y="270" width="132" height="54" rx="14" fill="#7f1d1d"/>
    <text x="366" y="304" fill="#fee2e2" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="21" font-weight="800">interrupt</text>

    <rect x="34" y="360" width="438" height="50" rx="14" fill="#111827" stroke="#1f2937"/>
    <text x="58" y="391" fill="#a7f3d0" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="19" font-weight="700">final output posted in the same thread</text>
  </g>

  <g transform="translate(642 112)">
    <rect x="0" y="0" width="124" height="32" rx="16" fill="#5865f2"/>
    <text x="23" y="22" fill="#ffffff" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="15" font-weight="800">DISCORD</text>

    <text x="0" y="112" fill="#ffffff" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="86" font-weight="900">CodeHelm</text>
    <rect x="4" y="136" width="430" height="7" rx="4" fill="url(#accent)"/>

    <text x="0" y="214" fill="#e2e8f0" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="42" font-weight="800">Control local Codex</text>
    <text x="0" y="264" fill="#e2e8f0" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="42" font-weight="800">sessions from Discord</text>

    <text x="0" y="338" fill="#cbd5e1" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="28" font-weight="600">Approve, resume, interrupt</text>
    <text x="0" y="378" fill="#cbd5e1" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="28" font-weight="600">from your phone.</text>

    <g transform="translate(0 430)">
      <rect x="0" y="0" width="176" height="44" rx="22" fill="#0f766e"/>
      <text x="26" y="29" fill="#ccfbf1" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="18" font-weight="800">local-first</text>
      <rect x="196" y="0" width="182" height="44" rx="22" fill="#1d4ed8"/>
      <text x="223" y="29" fill="#dbeafe" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="18" font-weight="800">phone-ready</text>
      <rect x="398" y="0" width="164" height="44" rx="22" fill="#4338ca"/>
      <text x="425" y="29" fill="#e0e7ff" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="18" font-weight="800">team-visible</text>
    </g>
  </g>
</svg>
